schema {
  query: Query
  mutation: Mutation
}

"Indicates exactly one field must be supplied and this field must not be `null`."
directive @oneOf on INPUT_OBJECT

input AbsoluteTimeRange {
  from: DateTime
  to: DateTime
}

type Badge {
  description: String
  id: ID!
  image: String!
  name: String!
}

input CheckCustomDomainAvailabilityInput {
  domain: String!
}

type CheckCustomDomainAvailabilityResult {
  available: Boolean!
  message: String
}

type CheckSubdomainAvailabilityResult {
  available: Boolean!
  message: String
}

type Comment {
  author: User!
  content: Content!
  dateAdded: DateTime!
  id: ID!
  replies(after: String, first: Int!): CommentConnection!
  totalReactions: Int!
}

type CommentConnection {
  edges: [CommentEdge!]!
  pageInfo: PageInfo!
}

type CommentEdge {
  cursor: String!
  node: Comment!
}

type Content {
  html: String!
  markdown: String!
  text: String!
}

type CoverImage {
  attribution: String
  isAttributionHidden: Boolean
  isPortrait: Boolean
  photographer: String
  url: String
}

input CreateImageUploadInput {
  """
  The content type of the image. Must start with "image/". Example: "image/png".
  """
  contentType: String!
}

type CreateImageUploadPayload {
  presignedPost: PresignedPost!
}

type CustomRule {
  destination: String!
  path: String!
  type: Int!
}

type DarkModePreferences {
  enabled: Boolean!
  logo: String
}

scalar DateTime

type DocumentationProject {
  guides(after: String, first: Int!): GuideConnection!
  id: ID!
  slug: String!
  title: String!
}

type Domain {
  host: String!
  ready: Boolean!
}

type DomainInfo {
  domain: Domain
  hashnodeSubdomain: String
  wwwPrefixedDomain: Domain
}

type Draft {
  author: User!
  content: Content
  coverImage: CoverImage
  id: ID!
  publishAs: User
  scheduledDate: DateTime
  settings: DraftSettings
  slug: String
  subtitle: String
  tags: [Tag!]
  title: String
  updatedAt: DateTime!
}

type DraftConnection {
  edges: [DraftEdge!]!
  pageInfo: PageInfo!
  totalDocuments: Int!
}

type DraftEdge {
  cursor: String!
  node: Draft!
}

type DraftSettings {
  disableComments: Boolean!
  enableTableOfContents: Boolean!
  isDelisted: Boolean!
  stickCoverToBottom: Boolean!
}

type EnabledPages {
  badges: Boolean!
  members: Boolean!
  newsletter: Boolean!
}

input FeedFilter {
  excludePublications: [ObjectId!]
  excludeTags: [String!]
  publications: [ObjectId!]
  tags: [String!]
}

type FeedPostConnection {
  edges: [PostEdge!]!
  pageInfo: PageInfo!
}

type GPTBotCrawlingFeature {
  isEnabled: Boolean!
}

type Guide {
  content: Content!
  id: ID!
  title: String!
}

type GuideConnection {
  edges: [GuideEdge!]!
  pageInfo: PageInfo!
}

type GuideEdge {
  cursor: String!
  node: Guide!
}

type HeadlessCMSFeature {
  isEnabled: Boolean!
}

type ImprintV2 {
  html: String
}

"""Arbitrary JSON object"""
scalar JSONObject

type Mutation {
  """
  Returns a presigned URL for uploading an image to Hashnode's CDN. Requires authentication.
  """
  createImageUploadURL(input: CreateImageUploadInput!): CreateImageUploadPayload!
  """Publish a new post to a publication. Requires authentication."""
  publishPost(input: PublishPostInput!): PublishPostPayload!
  """Update an existing post. Requires authentication."""
  updatePost(input: UpdatePostInput!): UpdatePostPayload!
}

type MyUser {
  availableFor: String
  badges: [Badge!]!
  bio: Content
  coverImage: String
  dateJoined: DateTime
  email: String!
  followers(after: String, first: Int!): UserConnection!
  follows(after: String, first: Int!): UserConnection!
  id: ID!
  location: String
  name: String!
  profilePicture: String
  publications(after: String, first: Int!): PublicationConnection!
  socialMediaLinks: SocialMediaLinks
  tagline: String
  username: String!
}

type NewsletterFeature {
  isEnabled: Boolean!
}

scalar ObjectId

type OffsetPageInfo {
  """Indicates if there are more pages."""
  hasNextPage: Boolean
  """Indicates if there are previous pages."""
  hasPreviousPage: Boolean
  """The page after the current page."""
  nextPage: Int
  """The page before the current page."""
  previousPage: Int
}

type OpenGraphMetaData {
  image: String
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  totalDocuments: Int
}

"""Contains the pending invite information."""
type PendingInvite {
  """The email of the user that was invited."""
  email: String
  id: ID!
  """The role assigned to the user in the publication."""
  role: UserPublicationRole!
  """
  Invited Hashnode user, returns null if the user is not a Hashnode user.
  """
  user: User
}

type PendingInviteConnection {
  nodes: [PendingInvite!]!
  pageInfo: OffsetPageInfo!
  totalDocuments: Int!
}

type Post {
  author: User!
  brief: String!
  canonicalUrl: String
  coAuthors: [User!]
  comments(after: String, first: Int!): CommentConnection!
  content: Content!
  coverImage: CoverImage
  cuid: String
  featured: Boolean
  features: PostFeatures!
  hasLatexInPost: Boolean
  id: ID!
  likedBy(after: String, first: Int!): UserConnection!
  ogMetaData: OpenGraphMetaData
  preferences: PostPreferences!
  publication: Publication
  publishedAt: DateTime!
  reactionCount: Int!
  readTimeInMinutes: Int!
  replyCount: Int!
  responseCount: Int!
  seo: SEO
  series: Series
  slug: String!
  subtitle: String
  tags: [Tag!]
  title: String!
  updatedAt: DateTime
  url: String!
  views: Int
}

type PostConnection {
  edges: [PostEdge!]!
  pageInfo: PageInfo!
  totalDocuments: Int
}

type PostEdge {
  cursor: String!
  node: Post!
}

type PostFeatures {
  tableOfContents: TableOfContents
}

type PostPreferences {
  disableComments: Boolean!
  isDelisted: Boolean!
  pinnedToBlog: Boolean!
  stickCoverToBottom: Boolean!
}

enum PostSortBy {
  DATE_PUBLISHED_ASC
  DATE_PUBLISHED_DESC
}

type PresignedPost {
  """
  The fields to include in the POST request body along with the image file.
  """
  fields: JSONObject!
  """The URL to POST the image to."""
  url: String!
}

type ProTeamFeature {
  isEnabled: Boolean!
}

type PublicMembers {
  totalDocuments: Int!
}

type Publication {
  about: Content
  allDrafts(after: String, first: Int!): DraftConnection!
  allScheduledDrafts(after: String, first: Int!): DraftConnection!
  allowContributorEdits: Boolean!
  author: User!
  canonicalURL: String
  customRules: [CustomRule!]!
  descriptionSEO: String
  displayTitle: String
  domainInfo: DomainInfo!
  drafts(after: String, first: Int!): DraftConnection!
  favicon: String
  features: PublicationFeatures!
  followersCount: Int
  hasBadges: Boolean
  headerColor: String
  id: ID!
  imprintV2: ImprintV2
  integrations: PublicationIntegrations
  """
  Details of publication invites. Returns null if publication is not a team publication.
  """
  invites: PublicationInvite
  isGitHubBackupEnabled: Boolean!
  isGithubAsSourceConnected: Boolean!
  isHeadless: Boolean!
  isTeam: Boolean!
  links: PublicationLinks
  members(after: String, first: Int!): PublicationMemberConnection!
  metaTags: String
  ogMetaData: OpenGraphMetaData
  pinnedPost: Post
  post(slug: String!): Post
  posts(after: String, filter: PublicationPostConnectionFilter, first: Int!): PostConnection!
  postsCount(first: Int!): PostConnection!
  preferences: PublicationPreferences!
  publicMembers(page: Int!, pageSize: Int!): PublicMembers!
  recommendedPublications: [RecommendedPublicationEdge!]!
  redirectedPost(slug: String!): RedirectedPost
  redirectionRules: [RedirectionRule!]!
  scheduledDrafts(after: String, first: Int!): DraftConnection!
  series(slug: String!): Series
  seriesList(after: String, first: Int!): SeriesConnection!
  staticPage(slug: String!): StaticPage
  staticPages(after: String, first: Int!): StaticPageConnection!
  submittedDrafts(after: String, first: Int!): DraftConnection!
  title: String!
  totalRecommendedPublications: Int!
  url: String
  urlPattern: String
}

type PublicationConnection {
  edges: [PublicationEdge!]!
  pageInfo: PageInfo!
}

type PublicationEdge {
  cursor: String!
  node: Publication!
}

type PublicationFeatures {
  gptBotCrawling: GPTBotCrawlingFeature
  headlessCMS: HeadlessCMSFeature
  newsletter: NewsletterFeature
  proTeam: ProTeamFeature
  readTime: ReadTimeFeature
  textSelectionSharer: TextSelectionSharerFeature
  viewCount: ViewCountFeature
}

type PublicationIntegrations {
  fathomCustomDomain: String
  fathomCustomDomainEnabled: Boolean
  fathomSiteID: String
  fbPixelID: String
  gTagManagerID: String
  gaTrackingID: String
  hotjarSiteID: String
  koalaPublicKey: String
  matomoSiteID: String
  matomoURL: String
  msClarityID: String
  plausibleAnalyticsEnabled: Boolean
  wmPaymentPointer: String
}

"""Contains the publication invite information."""
type PublicationInvite {
  """Signifies if invite links in role-based invites are active."""
  areRoleBasedInviteLinksActive: Boolean!
  pendingInvites(page: Int!, pageSize: Int!): PendingInviteConnection!
  roleBasedInvites(page: Int!, pageSize: Int!): RoleBasedInviteConnection!
}

type PublicationLinks {
  bluesky: String
  dailydev: String
  facebook: String
  github: String
  hashnode: String
  instagram: String
  linkedin: String
  mastodon: String
  twitter: String
  website: String
  youtube: String
}

type PublicationMember {
  id: ID!
  role: String!
  user: User!
}

type PublicationMemberConnection {
  edges: [PublicationMemberEdge!]!
  pageInfo: PageInfo!
}

type PublicationMemberEdge {
  cursor: String!
  node: PublicationMember!
}

type PublicationNavbarItem {
  id: ID!
  label: String!
  page: StaticPage
  series: Series
  type: String!
  url: String
}

input PublicationPostConnectionFilter {
  tagSlugs: [String!]
}

type PublicationPreferences {
  darkMode: DarkModePreferences
  disableFooterBranding: Boolean
  enabledPages: EnabledPages!
  isSubscriptionModalDisabled: Boolean
  layout: String
  logo: String
  navbarItems: [PublicationNavbarItem!]!
}

input PublishPostInput {
  """IDs of co-authors (max 4). Must be members of the publication."""
  coAuthors: [ObjectId!]
  """Post content in markdown format (required)."""
  contentMarkdown: String!
  """Cover image URL."""
  coverImage: String
  """Disable comments on this post."""
  disableComments: Boolean
  """Whether to delist the post from feeds (still accessible via URL)."""
  isDelisted: Boolean
  """SEO description override."""
  metaDescription: String
  """SEO title override."""
  metaTitle: String
  """Custom OG image URL."""
  ogImage: String
  """Canonical URL for republished articles."""
  originalArticleURL: String
  """The publication ID to publish to."""
  publicationId: ObjectId!
  """
  Publish on behalf of another user who is a member of the publication. Only for team publications.
  """
  publishAs: ObjectId
  """Backdate the post to a specific date."""
  publishedAt: DateTime
  """Add the post to a series by ID."""
  seriesId: ObjectId
  """Custom slug. If not provided, generated from title."""
  slug: String
  """Post subtitle (optional)."""
  subtitle: String
  """Tags as slugs (max 15). New tags will be created automatically."""
  tags: [PublishPostTagInput!]
  """Post title (required)."""
  title: String!
}

type PublishPostPayload {
  post: Post!
}

input PublishPostTagInput {
  """Tag name. Defaults to slug if not provided."""
  name: String
  """Tag slug (required). Used to find or create the tag."""
  slug: String!
}

type Query {
  """Check if a custom domain is available"""
  checkCustomDomainAvailability(input: CheckCustomDomainAvailabilityInput!): CheckCustomDomainAvailabilityResult!
  """Check if a subdomain is available"""
  checkSubdomainAvailability(subdomain: String!): CheckSubdomainAvailabilityResult!
  """Get documentation project by ID or host"""
  documentationProject(host: String, id: ID): DocumentationProject
  """Returns a draft by ID (requires authentication)"""
  draft(id: ObjectId!): Draft
  """Returns a paginated feed of posts"""
  feed(after: String, filter: FeedFilter, first: Int!): FeedPostConnection!
  """Returns the current authenticated user. Requires authentication."""
  me: MyUser
  """Returns a post by ID"""
  post(id: ID!): Post
  """Returns a publication by ID or host"""
  publication(host: String, id: ObjectId): Publication
  """Returns a scheduled post (requires authentication)"""
  scheduledPost(id: ObjectId!): ScheduledPost
  """Search posts within a publication"""
  searchPostsOfPublication(after: String, filter: SearchPostsOfPublicationFilter!, first: Int!, sortBy: PostSortBy): SearchPostConnection!
  """Returns a tag by slug"""
  tag(slug: String!): Tag
  """Get top commenters"""
  topCommenters(limit: Int, publicationId: ObjectId!): [User!]!
  """Returns a user by username"""
  user(username: String!): User
}

type ReadTimeFeature {
  isEnabled: Boolean!
}

type RecommendedPublicationEdge {
  node: Publication!
}

type RedirectedPost {
  id: ID!
  slug: String!
}

type RedirectionRule {
  destination: String!
  source: String!
  type: Int!
}

input RelativeTimeRange {
  n: Int!
  relative: TimePeriod!
}

type RoleBasedInvite {
  capacity: Int
  createdAt: DateTime
  expiryDate: DateTime
  id: ID!
  inviteLink: String
  isUnlimitedCapacity: Boolean
  role: UserPublicationRole!
  usedCapacity: Int
}

type RoleBasedInviteConnection {
  nodes: [RoleBasedInvite!]!
  pageInfo: OffsetPageInfo!
  totalDocuments: Int!
}

type SEO {
  description: String
  title: String
}

type ScheduledPost {
  author: User!
  draft: Draft!
  id: ID!
  publication: Publication
  scheduledDate: DateTime!
  slug: String!
  title: String!
}

type SearchPostConnection {
  edges: [PostEdge!]!
  pageInfo: PageInfo!
}

input SearchPostsOfPublicationFilter {
  """Author IDs to filter by (OR match)."""
  authorIds: [ID!]
  """Only return posts that are deleted. Returns active posts by default."""
  deletedOnly: Boolean
  """The ID of the publication to search from."""
  publicationId: ObjectId!
  """The query to be searched in post."""
  query: String
  """Tag IDs all of which must be present on the post (AND match)."""
  requiredTagsIds: [ID!]
  """Tag IDs to filter by (OR match)."""
  tagIds: [ID!]
  """Filter based on time range."""
  time: TimeFilter
}

type Series {
  author: User!
  coverImage: String
  cuid: String
  description: Content
  id: ID!
  name: String!
  posts(after: String, first: Int!): PostConnection!
  slug: String!
}

type SeriesConnection {
  edges: [SeriesEdge!]!
