  slug: String!
  title: String!
}

type StaticPageConnection {
  edges: [StaticPageEdge!]!
  pageInfo: PageInfo!
}

type StaticPageEdge {
  cursor: String!
  node: StaticPage!
}

type TableOfContents {
  isEnabled: Boolean!
  items: [TableOfContentsItem!]!
}

type TableOfContentsItem {
  id: ID!
  level: Int!
  parentId: ID
  slug: String!
  title: String!
}

type Tag {
  followersCount: Int!
  id: ID!
  info: String
  logo: String
  name: String!
  posts(after: String, first: Int!): PostConnection!
  postsCount: Int!
  slug: String!
  tagline: String
}

type TextSelectionSharerFeature {
  isEnabled: Boolean!
}

input TimeFilter {
  absolute: AbsoluteTimeRange
  relative: RelativeTimeRange
}

enum TimePeriod {
  LAST_N_DAYS
  LAST_N_HOURS
  LAST_N_MONTHS
  LAST_N_WEEKS
  LAST_N_YEARS
}

input UpdatePostInput {
  """Update co-authors (max 4). Must be members of the publication."""
  coAuthors: [ObjectId!]
  """Updated content in markdown format."""
  contentMarkdown: String
  """Updated cover image URL."""
  coverImage: String
  """Disable comments on this post."""
  disableComments: Boolean
  """The post ID to update."""
  id: ID!
  """Whether to delist the post from feeds."""
  isDelisted: Boolean
  """Updated SEO description."""
  metaDescription: String
  """Updated SEO title."""
  metaTitle: String
  """Updated OG image URL."""
  ogImage: String
  """Updated canonical URL."""
  originalArticleURL: String
  """Change the author. Must be a member of the publication."""
  publishAs: ObjectId
  """Backdate the post."""
  publishedAt: DateTime
  """Add or change the series. Must belong to the publication."""
  seriesId: ObjectId
  """Updated slug."""
  slug: String
  """Updated subtitle."""
  subtitle: String
  """Updated tags as slugs (max 15)."""
  tags: [PublishPostTagInput!]
  """Updated title."""
  title: String
}

type UpdatePostPayload {
  post: Post!
}

type User {
  availableFor: String
  badges: [Badge!]!
  bio: Content
  coverImage: String
  dateJoined: DateTime
  deactivated: Boolean
  followers(after: String, first: Int!): UserConnection!
  followersCount: Int!
  followingsCount: Int!
  follows(after: String, first: Int!): UserConnection!
  id: ID!
  location: String
  name: String!
  posts(after: String, first: Int!): PostConnection!
  profilePicture: String
  publications(after: String, first: Int!): PublicationConnection!
  socialMediaLinks: SocialMediaLinks
  tagline: String
  username: String!
}

type UserConnection {
  edges: [UserEdge!]!
  pageInfo: PageInfo!
}

type UserEdge {
  cursor: String!
  node: User!
}

enum UserPublicationRole {
  """Contributors can join the publication and contribute an article."""
  CONTRIBUTOR
  """
  Editors can customize the blog and approve/reject posts; they can also manage members.
  """
  EDITOR
  """The owner is the creator of the publication and can do all things."""
  OWNER
}

type ViewCountFeature {
  isEnabled: Boolean!
}